# .github/workflows/release.yml
# SPECTER auto-release workflow
#
# triggers only when .py files or firmware folders change on main branch
# readme, wiring docs, schematics, license etc. dont trigger a release
#
# security stuff:
#   we send a POST with a secret token + the new version number, thats it
#   the server checks the token is legit, then goes to github itself to fetch
#   the actual release -- we dont send it any urls or zip data or anything
#   so even if someone fakes the ping, the server just checks github and finds
#   whatever is actually there, cant trick it into serving something fake
#   devices also check the sha256 hash of the zip before installing so a
#   tampered download wont get through either
#   the whole thing falls apart if someone gets into your github account tho
#   so use 2FA, seriously
#
# version format is MAJOR.MINOR.PATCH
# patch is incremented automatically on every firmware push
# to bump major or minor, edit VERSION manually before pushing

name: SPECTER Auto Release

on:
  push:
    branches:
      - main
    paths:
      - '**.py'
      - 'core/**'
      - 'screens/**'
      - 'modules/**'
      - 'core/languages/strings.json'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      new_version: ${{ steps.version.outputs.new }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read and bump version
        id: version
        run: |
          if [ -f VERSION ]; then
            CURRENT=$(cat VERSION | tr -d '[:space:]')
          else
            CURRENT="1.0.0"
          fi
          echo "current=$CURRENT" >> $GITHUB_OUTPUT

          MAJOR=$(echo $CURRENT | cut -d. -f1)
          MINOR=$(echo $CURRENT | cut -d. -f2)
          PATCH=$(echo $CURRENT | cut -d. -f3)

          # check commit message for version bump keyword
          # [major] bumps major version, [minor] bumps minor, default bumps patch
          # [NO-NEW] means dont increment at all, just replace files in current release
          COMMIT_MSG=$(git log -1 --pretty=format:"%s")
          echo "Commit message: $COMMIT_MSG"

          if echo "$COMMIT_MSG" | grep -qi "\[no-new\]"; then
            NEW_VERSION="$CURRENT"
            echo "no_new=true" >> $GITHUB_OUTPUT
            echo "NO-NEW: keeping version $CURRENT, will replace existing release"
          elif echo "$COMMIT_MSG" | grep -qi "\[major\]"; then
            NEW_VERSION="$((MAJOR + 1)).0.0"
            echo "no_new=false" >> $GITHUB_OUTPUT
            echo "Bumping MAJOR"
          elif echo "$COMMIT_MSG" | grep -qi "\[minor\]"; then
            NEW_VERSION="$MAJOR.$((MINOR + 1)).0"
            echo "no_new=false" >> $GITHUB_OUTPUT
            echo "Bumping MINOR"
          else
            NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
            echo "no_new=false" >> $GITHUB_OUTPUT
            echo "Bumping PATCH (default)"
          fi

          echo "new=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Current: $CURRENT -> New: $NEW_VERSION"

      - name: Commit bumped version
        if: steps.version.outputs.no_new == 'false'
        run: |
          echo "${{ steps.version.outputs.new }}" > VERSION
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -m "chore: bump version to ${{ steps.version.outputs.new }} [skip ci]"
          git push

      - name: Build firmware zip
        id: build
        run: |
          VERSION=${{ steps.version.outputs.new }}
          ZIP_NAME="specter-firmware-v$VERSION.zip"
          zip -r -0 "$ZIP_NAME" \
            main.py \
            VERSION \
            core/ \
            screens/ \
            modules/ \
            --exclude "*.pyc" \
            --exclude "__pycache__/*" \
            --exclude ".DS_Store"
          # -0 means store only, no compression
          # this avoids needing uzlib on the pico w for extraction
          # the zip will be larger but the pico has plenty of flash
          echo "zip_name=$ZIP_NAME" >> $GITHUB_ENV
          sha256sum "$ZIP_NAME" > "$ZIP_NAME.sha256"
          SHA256=$(cat "$ZIP_NAME.sha256" | cut -d' ' -f1)
          echo "ZIP SHA256: $SHA256"
          echo "sha256=$SHA256" >> $GITHUB_OUTPUT

      - name: Get commit info
        id: commit
        run: |
          MSG=$(git log -1 --pretty=format:"%s" HEAD~1)
          HASH=$(git log -1 --pretty=format:"%h" HEAD~1)
          echo "message=$MSG" >> $GITHUB_OUTPUT
          echo "hash=$HASH" >> $GITHUB_OUTPUT

      - name: Create GitHub release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "SPECTER ${{ steps.version.outputs.tag }}"
          # if NO-NEW, overwrite the existing release assets without creating a new release
          # if its a new version, draft=false creates a fresh release
          prerelease: false
          body: |
            ## SPECTER Firmware ${{ steps.version.outputs.tag }}

            **Commit:** `${{ steps.commit.outputs.hash }}` ${{ steps.commit.outputs.message }}

            ---

            ### Option 1 -- UF2 (easiest, recommended for first install)

            No MicroPython needed, this flashes everything in one go.

            1. Hold the **BOOTSEL** button on your Pico W while plugging it into USB
            2. It shows up as a USB drive called **RPI-RP2**
            3. Drag **`specter-${{ steps.version.outputs.tag }}.uf2`** onto the drive
            4. The Pico reboots automatically and SPECTER starts up

            ### Option 2 -- OTA update (if SPECTER is already installed)

            On your device go to **Settings → Check Updates** and follow the on screen prompts.
            Your WiFi network must be set up first under **Settings → WiFi Setup**.

            ### Option 3 -- Manual zip install (advanced)

            1. Flash standard MicroPython for Pico W from [micropython.org](https://micropython.org/download/RPI_PICO_W/)
            2. Download **`specter-firmware-${{ steps.version.outputs.tag }}.zip`** and extract it
            3. Copy all files and folders to the Pico W using Thonny or mpremote
            4. Make sure the folder structure matches what is in the zip

            ---

            ### Checksums
            ```
            ${{ steps.build.outputs.sha256 }}  specter-firmware-${{ steps.version.outputs.tag }}.zip
            ```

            ---
            *Auto-released by GitHub Actions -- built from commit `${{ steps.commit.outputs.hash }}`*
            *Hardware wiring and build guide: see [WIRING.md](https://github.com/KjernNo/specter/blob/main/WIRING.md)*
          files: |
            ${{ env.zip_name }}
            ${{ env.zip_name }}.sha256
          draft: false
          # clobber replaces existing assets if the tag already exists (used by NO-NEW)

      - name: Ping server to notify new release
        continue-on-error: true   # server might not be up yet, dont fail the release over it
        run: |
          # just pinging the server with the version number and our secret token
          # the server verifies the token then goes to github itself to grab the release
          # we dont send it the zip or any urls, it fetches all that itself
          # keeps things simple and means we cant accidentally send it wrong data
          HTTP_STATUS=$(curl -s -o /tmp/server_response.txt -w "%{http_code}" \
            -X POST https://specter.kjern.no/update/notify \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.SPECTER_NOTIFY_SECRET }}" \
            -d '{"version": "${{ steps.version.outputs.new }}"}')

          echo "Server responded with HTTP $HTTP_STATUS"
          echo "Response: $(cat /tmp/server_response.txt)"

          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
            echo "Server notified, it will fetch release info from GitHub itself"
          else
            echo "WARNING: server ping failed with HTTP $HTTP_STATUS"
            echo "The release is still published on GitHub"
            echo "Server will pick up the new version on its next scheduled check"
            exit 0
          fi

  build-uf2:
    runs-on: ubuntu-latest
    needs: release   # run after the main release job
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get install -y python3 python3-pip
          pip3 install mpremote

      - name: Download MicroPython UF2 for Pico W
        run: |
          # always use a pinned micropython version so builds are reproducible
          # update this url when you want to ship a newer micropython version
          MPYTHON_URL="https://micropython.org/resources/firmware/RPI_PICO_W-20241025-v1.24.0.uf2"
          curl -L -o micropython.uf2 "$MPYTHON_URL"
          echo "Downloaded MicroPython UF2"
          ls -lh micropython.uf2

      - name: Install littlefs-python to build filesystem image
        run: pip3 install littlefs-python

      - name: Build filesystem image with SPECTER files
        run: |
          python3 << 'PYEOF'
          import littlefs
          import os
          import glob

          # pico w flash layout:
          # micropython uses a littlefs2 filesystem in the last part of flash
          # total flash is 2MB, micropython uses roughly 1MB for itself
          # leaving about 1MB for the filesystem
          # block size 4096, block count 352 = ~1.4MB filesystem
          fs = littlefs.LittleFS(block_size=4096, block_count=352, prog_size=256)

          def add_file(fs, local_path, remote_path):
              print(f"Adding {local_path} -> {remote_path}")
              with open(local_path, 'rb') as f:
                  data = f.read()
              # create parent directories
              parts = remote_path.split('/')
              for i in range(1, len(parts)):
                  d = '/'.join(parts[:i])
                  if d:
                      try: fs.mkdir(d)
                      except: pass
              with fs.open(remote_path, 'wb') as f:
                  f.write(data)

          def add_dir(fs, local_dir, remote_dir):
              for root, dirs, files in os.walk(local_dir):
                  for fname in files:
                      if fname.endswith('.pyc') or fname == '.DS_Store':
                          continue
                      local  = os.path.join(root, fname)
                      remote = remote_dir + '/' + local[len(local_dir):]
                      remote = remote.replace('\\', '/').replace('//', '/')
                      add_file(fs, local, remote)

          # add all firmware files
          add_file(fs, 'main.py', '/main.py')
          add_file(fs, 'VERSION', '/VERSION')
          add_dir(fs, 'core',    '/core')
          add_dir(fs, 'screens', '/screens')
          add_dir(fs, 'modules', '/modules')

          # write filesystem image
          # littlefs-python stores the image in fs.context.buffer
          with open('fs.img', 'wb') as f:
              f.write(bytes(fs.context.buffer))
          print(f"Filesystem image: {os.path.getsize('fs.img')} bytes")
          PYEOF

      - name: Combine MicroPython + filesystem into single UF2
        env:
          SPECTER_VERSION: ${{ needs.release.outputs.new_version }}
        run: |
          python3 << 'PYEOF'
          # UF2 format: 256 byte blocks, each containing 256 bytes of data
          # we append the filesystem image to the micropython uf2
          # at the correct flash offset for pico w (0x10000000 base + offset)
          #
          # pico w flash map:
          #   0x10000000  bootloader
          #   0x10000100  micropython firmware
          #   0x10180000  littlefs filesystem start (roughly, depends on build)
          # the exact filesystem offset is embedded in the micropython binary
          # for the standard micropython 1.24.0 build it is 0x10180000

          import struct
          import os

          UF2_MAGIC_START0 = 0x0A324655
          UF2_MAGIC_START1 = 0x9E5D5157
          UF2_MAGIC_END    = 0x0AB16F30
          FS_FLASH_OFFSET  = 0x10180000   # filesystem start in pico w flash
          FLAG_FAMILYID    = 0x00002000
          FAMILY_ID        = 0xe48bff56   # rp2040 family id

          def read_uf2(path):
              blocks = []
              with open(path, 'rb') as f:
                  while True:
                      block = f.read(512)
                      if len(block) < 512:
                          break
                      blocks.append(block)
              return blocks

          def make_uf2_block(data, addr, block_no, total_blocks):
              assert len(data) == 256
              payload = struct.pack('<IIIIII',
                  UF2_MAGIC_START0,
                  UF2_MAGIC_START1,
                  FLAG_FAMILYID,
                  addr,
                  256,
                  block_no,
              )
              payload += struct.pack('<I', total_blocks)
              payload += struct.pack('<I', FAMILY_ID)
              payload += data
              payload += b'\x00' * (476 - 256)
              payload += struct.pack('<I', UF2_MAGIC_END)
              assert len(payload) == 512
              return payload

          # read existing micropython uf2 blocks
          mp_blocks = read_uf2('micropython.uf2')
          print(f"MicroPython UF2: {len(mp_blocks)} blocks")

          # read filesystem image and split into 256 byte chunks
          with open('fs.img', 'rb') as f:
              fs_data = f.read()

          # pad to 256 byte boundary
          if len(fs_data) % 256:
              fs_data += b'\xff' * (256 - len(fs_data) % 256)

          fs_chunks = [fs_data[i:i+256] for i in range(0, len(fs_data), 256)]
          print(f"Filesystem: {len(fs_chunks)} blocks at 0x{FS_FLASH_OFFSET:08x}")

          total_blocks = len(mp_blocks) + len(fs_chunks)

          # renumber micropython blocks with new total
          new_mp = []
          for i, block in enumerate(mp_blocks):
              data    = block[32:288]   # payload bytes
              addr    = struct.unpack('<I', block[12:16])[0]
              new_mp.append(make_uf2_block(data, addr, i, total_blocks))

          # build filesystem blocks
          fs_blocks = []
          for i, chunk in enumerate(fs_chunks):
              addr = FS_FLASH_OFFSET + i * 256
              fs_blocks.append(make_uf2_block(chunk, addr, len(mp_blocks) + i, total_blocks))

          # write combined uf2
          # read version from the VERSION file that was committed by release job
          # we pass it via env var to avoid reading the wrong file
          import os
          version = os.environ.get('SPECTER_VERSION', open('VERSION').read().strip())
          out_name = f'specter-v{version}.uf2'
          with open(out_name, 'wb') as f:
              for block in new_mp + fs_blocks:
                  f.write(block)

          print(f"Written {out_name}: {os.path.getsize(out_name)} bytes")
          with open('uf2_name.txt', 'w') as f:
              f.write(out_name)
          PYEOF

      - name: Upload UF2 to existing release
        run: |
          UF2_NAME=$(cat uf2_name.txt)
          # use the tag from the release job, not the VERSION file on disk
          # the VERSION file in the checkout may still be the old version
          # because the version bump commit happens in the release job
          # and the build-uf2 job checks out before that commit is visible
          TAG="${{ needs.release.outputs.tag }}"

          echo "Uploading $UF2_NAME to release $TAG"

          gh release upload "$TAG" "$UF2_NAME" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
